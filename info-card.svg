<svg xmlns="http://www.w3.org/2000/svg" width="490" height="228" viewBox="0 0 490 228" font-family="Menlo, Consolas, 'SF Mono', monospace">

  <style>
    .card { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
    .dot { opacity: 0.9; }
    .title { fill: #39d353; font-size: 15px; font-weight: bold; }
    .key { font-size: 13px; font-weight: bold; }
    .value { fill: #c9d1d9; font-size: 13px; }
    .dim { fill: #8b949e; font-size: 12px; }
    .line { opacity: 0; transform-box: fill-box; transform-origin: left; animation: fadein 0.45s ease-out forwards; }
    @keyframes fadein {
      0%   { opacity: 0; transform: translateX(-6px); }
      100% { opacity: 1; transform: translateX(0); }
    }
  </style>

